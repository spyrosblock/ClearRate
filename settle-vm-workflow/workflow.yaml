# ==========================================================================
# CRE WORKFLOW SETTINGS — VM Settlement Workflow
# ==========================================================================
# Settles variation margin for cleared IRS positions by calling the
# ClearingHouse._processReport() function with reportType = 1.

# ==========================================================================
staging-settings:
  user-workflow:
    workflow-name: "settle-vm-workflow"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../secrets.yaml"

# ==========================================================================
production-settings:
  user-workflow:
    workflow-name: "settle-vm-workflow-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: ""
