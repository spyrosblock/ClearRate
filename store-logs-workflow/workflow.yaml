# ==========================================================================
# CRE WORKFLOW SETTINGS — Store Logs Workflow
# ==========================================================================
# Stores novated trade events and position matured events from the
# ClearingHouse contract to a PostgreSQL database.

# ==========================================================================
staging-settings:
  user-workflow:
    workflow-name: "store-logs-workflow"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../secrets.yaml"

# ==========================================================================
production-settings:
  user-workflow:
    workflow-name: "store-logs-workflow-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: ""
