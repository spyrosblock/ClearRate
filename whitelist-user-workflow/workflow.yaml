# ==========================================================================
# CRE WORKFLOW SETTINGS — Whitelist User Workflow
# ==========================================================================
# This workflow is triggered via HTTP and adds participants to the Whitelist
# contract after KYC verification via an external API.

# ==========================================================================
staging-settings:
  user-workflow:
    workflow-name: "whitelist-user-workflow"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "../secrets.yaml"

# ==========================================================================
production-settings:
  user-workflow:
    workflow-name: "whitelist-user-workflow-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: ""
